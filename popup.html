<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; width: 260px; margin: 0; padding: 14px; color: #222; }
    h1 { font-size: 14px; margin: 0 0 12px; color: #128C7E; }
    label { display: flex; align-items: center; gap: 8px; font-size: 13px; margin: 8px 0; cursor: pointer; }
    .row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
    button { font-size: 12px; padding: 6px 10px; border: 1px solid #ccc; background: #fafafa; border-radius: 4px; cursor: pointer; }
    button:hover { background: #f0f0f0; }
    .host { font-size: 11px; color: #666; word-break: break-all; margin-top: 4px; }
    #status { font-size: 11px; color: #128C7E; margin-top: 8px; min-height: 14px; }
  </style>
</head>
<body>
  <h1>WhatsApp Quick Link</h1>
  <label><input type="checkbox" id="globalToggle"> Enable everywhere</label>
  <label><input type="checkbox" id="siteToggle"> Enable on this site</label>
  <div class="host" id="hostLabel"></div>
  <div class="row">
    <button id="clearCache">Clear cache</button>
    <span id="status"></span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
